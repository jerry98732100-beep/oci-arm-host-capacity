name: Oracle ARM Auto Launcher

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Dependencies
        run: composer update --prefer-dist --no-progress

      - name: Setup Private Key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Debug Parameters # 新增偵錯步驟
        run: |
          echo "Checking Parameter Formats (lengths):"
          echo "Region: ${{ secrets.OCI_REGION }}"
          echo "AD Name Length: $(echo -n "${{ secrets.OCI_AVAILABILITY_DOMAIN }}" | wc -c)"
          echo "Subnet ID starts with: $(echo "${{ secrets.OCI_SUBNET_ID }}" | cut -c 1-20)..."
          echo "Image ID starts with: $(echo "${{ secrets.OCI_IMAGE_ID }}" | cut -c 1-20)..."

      - name: Run Launcher
        run: php index.php
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: "private_key.pem"
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: 1
          OCI_SSH_PUBLIC_KEY: ""
